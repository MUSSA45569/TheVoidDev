<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="100%" height="100%">
  <defs>
    <style>
      /* 1. Base Ambient Shifting Color Gradient */
      @keyframes ambientHue {
        0% { stop-color: #050014; }
        50% { stop-color: #1a0236; }
        100% { stop-color: #050014; }
      }
      @keyframes ambientHueTwo {
        0% { stop-color: #2e0854; }
        50% { stop-color: #581c87; }
        100% { stop-color: #2e0854; }
      }
      .bg-stop-1 { animation: ambientHue 12s infinite ease-in-out; }
      .bg-stop-2 { animation: ambientHueTwo 12s infinite ease-in-out; }

      /* 2. Shutter Scanline Intro Wipe */
      @keyframes scannerWipe {
        0% { transform: scaleX(1); opacity: 1; }
        35% { transform: scaleX(1); opacity: 1; }
        75% { transform: scaleX(0.002); opacity: 0.9; }
        90% { transform: scaleX(0.002); opacity: 0; }
        100% { transform: scaleX(0); opacity: 0; visibility: hidden; }
      }
      .shutter-panel {
        animation: scannerWipe 2.8s forwards cubic-bezier(0.77, 0, 0.175, 1);
        transform-origin: left center;
        fill: #FFFFFF;
      }

      /* 3. High-Fidelity Entrance Timings */
      @keyframes premiumReveal {
        0% { opacity: 0; transform: translateY(20px) scale(0.96); filter: blur(8px); }
        100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }
      
      .main-title-layer {
        opacity: 0;
        animation: premiumReveal 1.4s forwards cubic-bezier(0.16, 1, 0.3, 1);
        animation-delay: 2.4s;
      }

      .sub-title-layer {
        opacity: 0;
        animation: premiumReveal 1.2s forwards cubic-bezier(0.16, 1, 0.3, 1);
        animation-delay: 3.4s;
      }

      /* 4. Background Node Pulsing */
      @keyframes pulseNode {
        0% { opacity: 0.2; }
        50% { opacity: 0.6; }
        100% { opacity: 0.2; }
      }
      .circuit-node { animation: pulseNode 4s infinite ease-in-out; }
    </style>

    <linearGradient id="cyberBackground" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="bg-stop-1"/>
      <stop offset="100%" class="bg-stop-2"/>
    </linearGradient>

    <filter id="megaGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur1"/>
      <feGaussianBlur stdDeviation="5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="dotMatrix" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#a855f7" opacity="0.25"/>
    </pattern>
  </defs>

  <rect width="1600" height="500" fill="url(#cyberBackground)"/>
  <rect width="1600" height="500" fill="url(#dotMatrix)"/>

  <g stroke="#c084fc" stroke-width="1" opacity="0.15">
    <line x1="100" y1="50" x2="1500" y2="50" />
    <line x1="100" y1="450" x2="1500" y2="450" />
    <line x1="150" y1="50" x2="150" y2="450" />
    <line x1="1450" y1="50" x2="1450" y2="450" />
  </g>

  <circle cx="150" cy="50" r="4" fill="#d8b4fe" class="circuit-node" filter="url(#megaGlow)" />
  <circle cx="1450" cy="50" r="4" fill="#d8b4fe" class="circuit-node" filter="url(#megaGlow)" style="animation-delay: -1s;" />
  <circle cx="150" cy="450" r="4" fill="#d8b4fe" class="circuit-node" filter="url(#megaGlow)" style="animation-delay: -2s;" />
  <circle cx="1450" cy="450" r="4" fill="#d8b4fe" class="circuit-node" filter="url(#megaGlow)" style="animation-delay: -3s;" />

  <g class="main-title-layer" transform="translate(800, 230)">
    <text text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="900" font-size="102" fill="#c084fc" opacity="0.8" filter="url(#megaGlow)" letter-spacing="8">YOUR_NAME</text>
    <text text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="900" font-size="102" fill="#FFFFFF" letter-spacing="8">YOUR_NAME</text>
  </g>

  <g class="sub-title-layer">
    <text x="800" y="315" text-anchor="middle" font-family="'Consolas', 'Courier New', monospace" font-size="18" font-weight="bold" fill="#e9d5ff" letter-spacing="4" opacity="0.85">
      // CORE DEV • BOT ARCHITECT • AUTOMATION SCRIPTING //
    </text>
  </g>

  <rect width="1600" height="500" class="shutter-panel"/>
</svg>
