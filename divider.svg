<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 20" width="100%">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C084FC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <line x1="0" y1="10" x2="1200" y2="10" stroke="url(#lineGrad)" stroke-width="3" filter="url(#lineGlow)"/>
  <polygon points="600,3 607,10 600,17 593,10" fill="#FFFFFF" filter="url(#lineGlow)"/>
</svg>
